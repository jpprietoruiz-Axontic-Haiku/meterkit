name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: meterkit
          POSTGRES_PASSWORD: meterkit
          POSTGRES_DB: meterkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meterkit -d meterkit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://meterkit:meterkit@localhost:5432/meterkit
      JWT_SECRET: ci-test-secret-must-be-at-least-32-chars
      # Claves de test: no son secretos reales, solo permiten construir el
      # cliente de Stripe y firmar/verificar webhooks localmente en los tests.
      STRIPE_SECRET_KEY: sk_test_ci_dummy_key_for_signature_only
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy_secret_for_tests

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Apply migrations
        run: bun --cwd apps/api run db:migrate

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
